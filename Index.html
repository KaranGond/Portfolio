<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio.</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f2f2f2;
    }

    #video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    #video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card {
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 40px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      text-align: center;
      color: #fff;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #333;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div id="video-background">
    <video autoplay muted loop>
      <source src="C:\Users\evilk\Downloads\Video\Waves - 70796.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <div class="logo">
      <img src="C:\Users\evilk\Downloads\Video\logo.jpeg" alt="Logo">
    </div>
    <h1>Welcome to Knowledge of Ocean</h1>
    <p>Ready to dive?</p>
    <a href="#" class="button">Dive</a>
  </div>

</body>
</html>
